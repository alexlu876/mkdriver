# Per-track metadata for the multi-track MKWii BTR training.
#
# The reward function reads this file at env construction time; see
# docs/TRAINING_METHODOLOGY.md §1 for the formula
# (n_checkpoints_per_lap = round(100 × wr_seconds / 60)).
#
# WR source: speedrun.com/mkwii, 2026-04-21 snapshot. For each track,
# we prefer the "no glitch" world-record time; for tracks without a
# published no-glitch WR we fall back to the "current" (with shortcut)
# WR and mark the category explicitly so we can audit later.
#
# wr_category values:
#   non_glitch — standard no-glitch leaderboard WR (preferred).
#   shortcut   — with-shortcut WR; used only because no non-glitch
#                WR was published on speedrun.com at snapshot time.
#                Typically short by ~30-60% vs. a non-glitch lap.
#                Tracks marked shortcut should be treated with some
#                caution — the checkpoint count may under-reward
#                non-shortcut driving. Revisit if training plateaus
#                on these specifically.
#
# Tracks are grouped by cup in game order. Slugs use lowercase with
# underscores and the _tt suffix per docs/SAVESTATE_PROTOCOL.md.

